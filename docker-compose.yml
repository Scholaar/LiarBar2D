version: '3.8'

services:
  server:
    build: .
    ports:
      - '2567:2567'
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PORT=2567

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - server
    restart: unless-stopped
